<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps Rank Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #999;
    --bad: #ff4d4d;
    --mid: #ffb347;
    --good: #c8f135;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 36px;
  }

  .logo {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .logo a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .logo a:hover { color: var(--accent); }

  h1 {
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input[type="password"] { letter-spacing: 0.1em; }

  .hint {
    margin-top: 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) {
    .two-col, .three-col { grid-template-columns: 1fr; }
  }

  .btn-run {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
  }
  .btn-run:hover { opacity: 0.9; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    align-items: center;
    gap: 10px;
    display: none;
  }
  .status-bar.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--bad);
    margin-bottom: 16px;
    display: none;
  }
  .error-box.visible { display: block; }

  /* ── RESULTS ── */
  #results { display: none; }

  .results-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .results-top h2 {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .stat-pill strong { color: var(--text); font-size: 16px; display: block; }

  /* MAP */
  #map {
    width: 100%;
    height: 560px;
    border-radius: 4px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* Override Leaflet popup styles */
  .leaflet-popup-content-wrapper {
    background: #1a1a1a;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    font-family: 'DM Mono', monospace;
  }
  .leaflet-popup-tip { background: #1a1a1a; }
  .leaflet-popup-content { margin: 14px 16px; min-width: 220px; }

  .popup-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .popup-list { list-style: none; }
  .popup-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .popup-list li:last-child { border-bottom: none; }

  .popup-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    color: #000;
  }

  .popup-you { color: var(--accent); font-weight: 700; }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* GRID TABLE */
  .grid-section {
    margin-top: 24px;
  }

  .grid-section h3 {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .grid-table {
    display: grid;
    gap: 3px;
  }

  .grid-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(10px, 2vw, 16px);
    cursor: default;
    transition: transform 0.1s;
  }
  .grid-cell:hover { transform: scale(1.05); }
  .grid-cell.center-pin {
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px var(--accent);
  }

  .btn-save {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 3px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.15s, color 0.15s;
  }
  .btn-save:hover { background: var(--accent); color: #0a0a0a; }

  /* Grid size preview */
  .grid-preview {
    display: inline-grid;
    gap: 2px;
    margin-top: 8px;
  }
  .grid-preview-cell {
    width: 8px; height: 8px;
    background: var(--border);
    border-radius: 1px;
  }
  .grid-preview-cell.center { background: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <a href="/index.html">← Bulk Rank Checker</a>
      &nbsp;/&nbsp; Maps Rank Tracker
    </div>
    <h1>Rank <span>Grid</span> Tracker</h1>
    <p class="subtitle">// see where a business ranks across the whole neighborhood</p>
  </header>

  <div id="inputSection">

    <div class="card">
      <div class="field">
        <label>Apify API Token</label>
        <input type="password" id="apifyToken" placeholder="apify_api_xxxx…" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <div class="two-col">
        <div class="field">
          <label>Business — Google Maps URL</label>
          <input type="url" id="mapsUrl" placeholder="https://www.google.com/maps/place/…">
          <div class="hint" id="coordsHint">// coordinates extracted automatically</div>
        </div>
        <div class="field">
          <label>Keyword</label>
          <input type="text" id="keyword" placeholder="e.g. electricista, plomero…">
          <div class="hint">// what customers search for</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="three-col">
        <div class="field">
          <label>Grid Size</label>
          <select id="gridSize">
            <option value="3">3×3 — 9 points (fast)</option>
            <option value="4">4×4 — 16 points</option>
            <option value="5" selected>5×5 — 25 points</option>
            <option value="6">6×6 — 36 points</option>
            <option value="7">7×7 — 49 points</option>
            <option value="8">8×8 — 64 points</option>
            <option value="9">9×9 — 81 points (slow)</option>
          </select>
          <div class="grid-preview" id="gridPreview"></div>
        </div>
        <div class="field">
          <label>Spacing between points</label>
          <select id="gridSpacing">
            <option value="0.5">0.5 km — tight neighborhood</option>
            <option value="1" selected>1 km — neighborhood</option>
            <option value="2">2 km — district</option>
            <option value="3">3 km — city zone</option>
            <option value="5">5 km — wide area</option>
          </select>
        </div>
        <div class="field">
          <label>Results per point</label>
          <select id="maxResults">
            <option value="10">Top 10</option>
            <option value="20" selected>Top 20</option>
          </select>
        </div>
      </div>
    </div>

    <button class="btn-run" id="runBtn" onclick="runTracker()">▶ Run Grid Tracker</button>

  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Starting…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <div class="results-top">
      <h2 id="resultsTitle">Grid Results</h2>
      <button class="btn-save" onclick="window.print()">⬇ Save as PDF</button>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> #1–3 Top</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c8f135"></div> #4–7 Good</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ffb347"></div> #8–15 Mid</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff4d4d"></div> #16–20 Low</div>
      <div class="legend-item"><div class="legend-dot" style="background:#333"></div> 20+ Invisible</div>
    </div>

    <div id="map"></div>

    <div class="grid-section">
      <h3>// grid overview</h3>
      <div class="grid-table" id="gridTable"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const BASE  = 'https://api.apify.com/v2';
  const ACTOR = 'compass~crawler-google-places';

  let map = null;
  let parsedCoords = null;

  // ── Grid preview ──
  function updateGridPreview() {
    const dim = parseInt(document.getElementById('gridSize').value);
    const mid = Math.floor(dim / 2);
    const preview = document.getElementById('gridPreview');
    preview.style.gridTemplateColumns = `repeat(${dim}, 8px)`;
    preview.innerHTML = '';
    for (let r = 0; r < dim; r++) {
      for (let c = 0; c < dim; c++) {
        const cell = document.createElement('div');
        cell.className = 'grid-preview-cell' + (r === mid && c === mid ? ' center' : '');
        preview.appendChild(cell);
      }
    }
  }

  document.getElementById('gridSize').addEventListener('change', updateGridPreview);
  updateGridPreview();

  // ── Coord extraction ──
  document.getElementById('mapsUrl').addEventListener('input', function() {
    const coords = extractCoords(this.value.trim());
    const hint = document.getElementById('coordsHint');
    if (coords) {
      parsedCoords = coords;
      hint.textContent = `📍 ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`;
      hint.style.color = 'var(--accent)';
    } else {
      parsedCoords = null;
      hint.textContent = '// coordinates extracted automatically';
      hint.style.color = 'var(--muted)';
    }
  });

  function extractCoords(url) {
    let m = url.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    m = url.match(/!3d(-?\d{1,3}\.\d+).*?!4d(-?\d{1,3}\.\d+)/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    return null;
  }

  function extractName(url) {
    const m = url.match(/maps\/place\/([^/@]+)/);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : 'Business';
  }

  // ── Utils ──
  function setStatus(msg) {
    document.getElementById('statusBar').classList.add('visible');
    document.getElementById('statusText').textContent = msg;
  }
  function hideStatus() { document.getElementById('statusBar').classList.remove('visible'); }
  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = '⚠ ' + msg;
    b.classList.add('visible');
  }
  function clearError() { document.getElementById('errorBox').classList.remove('visible'); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function normalize(s) { return String(s).toLowerCase().replace(/[^a-z0-9]/g, ''); }

  // ── Rank color ──
  function rankColor(rank) {
    if (!rank || rank > 20) return '#333';
    if (rank <= 3)  return '#16a34a';
    if (rank <= 7)  return '#c8f135';
    if (rank <= 15) return '#ffb347';
    return '#ff4d4d';
  }

  function rankTextColor(rank) {
    if (!rank || rank > 20) return '#666';
    if (rank <= 7) return '#000';
    return '#000';
  }

  // ── Apify ──
  async function startActor(token, input) {
    const res = await fetch(`/api/proxy?url=${encodeURIComponent(
      `${BASE}/acts/${ACTOR}/runs?token=${token}`
    )}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(input),
    });
    if (!res.ok) throw new Error(`Apify HTTP ${res.status}`);
    const { data: run } = await res.json();
    return run;
  }

  async function pollUntilDone(token, runId, label) {
    for (let i = 0; i < 72; i++) {
      await sleep(5000);
      const res  = await fetch(`/api/proxy?url=${encodeURIComponent(`${BASE}/actor-runs/${runId}?token=${token}`)}`);
      const data = await res.json();
      const s    = data.data.status;
      setStatus(`${label} — ${s} (${(i+1)*5}s)…`);
      if (s === 'SUCCEEDED') return data.data.defaultDatasetId;
      if (['FAILED','ABORTED','TIMED-OUT'].includes(s)) throw new Error(`Apify run ${s}`);
    }
  }

  async function fetchItems(token, datasetId) {
    const res = await fetch(`/api/proxy?url=${encodeURIComponent(
      `${BASE}/datasets/${datasetId}/items?token=${token}&limit=500`
    )}`);
    return res.json();
  }

  // ── Build grid points ──
  function buildGrid(lat, lng, dim, spacingKm) {
    const kmPerDeg = 111.32;
    const half = (dim - 1) / 2;
    const points = [];
    for (let row = 0; row < dim; row++) {
      for (let col = 0; col < dim; col++) {
        const dlat = (row - half) * spacingKm / kmPerDeg;
        const dlng = (col - half) * spacingKm / (kmPerDeg * Math.cos(lat * Math.PI / 180));
        points.push({
          lat: lat + dlat,
          lng: lng + dlng,
          row, col,
          isCenter: row === Math.floor(dim/2) && col === Math.floor(dim/2),
        });
      }
    }
    return points;
  }

  // ── Main ──
  async function runTracker() {
    clearError();
    document.getElementById('results').style.display = 'none';

    const token     = document.getElementById('apifyToken').value.trim();
    const url       = document.getElementById('mapsUrl').value.trim();
    const keyword   = document.getElementById('keyword').value.trim();
    const dim       = parseInt(document.getElementById('gridSize').value);
    const spacingKm = parseFloat(document.getElementById('gridSpacing').value);
    const maxRes    = parseInt(document.getElementById('maxResults').value);

    if (!token)   return showError('Apify token is required.');
    if (!url)     return showError('Google Maps URL is required.');
    if (!keyword) return showError('Keyword is required.');
    if (!parsedCoords) return showError('Could not read coordinates from URL. Use a full Google Maps URL.');

    const bizName  = extractName(url);
    const normBiz  = normalize(bizName);
    const { lat, lng } = parsedCoords;
    const points   = buildGrid(lat, lng, dim, spacingKm);
    const total    = points.length;

    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    const results = []; // { row, col, lat, lng, rank, isCenter, places }

    try {
      for (let i = 0; i < points.length; i++) {
        const pt = points[i];
        setStatus(`Searching point ${i+1} of ${total}… (${dim}×${dim} grid)`);

        const run = await startActor(token, {
          searchStringsArray: [keyword],
          lat: pt.lat,
          lng: pt.lng,
          zoom: 14,
          maxCrawledPlacesPerSearch: maxRes,
          language: 'en',
          maxImages: 0,
          maxReviews: 0,
          exportPlaceUrls: false,
          scrapeContacts: false,
          scrapeDirections: false,
          additionalInfo: false,
        });

        const datasetId = await pollUntilDone(token, run.id, `Point ${i+1}/${total}`);
        const items     = await fetchItems(token, datasetId);
        items.sort((a, b) => (a.rank ?? 999) - (b.rank ?? 999));

        // Find our business
        let rank = null;
        const places = items.map((item, idx) => {
          const name    = item.title || item.name || '';
          const normName = normalize(name);
          const isUs = normName.includes(normBiz) || normBiz.includes(normName);
          if (isUs && rank === null) rank = item.rank ?? (idx + 1);
          return { name, rank: item.rank ?? (idx + 1), isUs };
        });

        results.push({ ...pt, rank, places });
      }

      hideStatus();
      renderResults(results, bizName, keyword, dim, lat, lng);

    } catch (err) {
      hideStatus();
      showError(err.message);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Render ──
  function renderResults(results, bizName, keyword, dim, centerLat, centerLng) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('resultsTitle').textContent = `"${keyword}" — ${bizName}`;

    // Stats
    const found    = results.filter(r => r.rank && r.rank <= 20);
    const top3     = results.filter(r => r.rank && r.rank <= 3).length;
    const top7     = results.filter(r => r.rank && r.rank <= 7).length;
    const invisible = results.filter(r => !r.rank || r.rank > 20).length;
    const avgRank  = found.length ? (found.reduce((s, r) => s + r.rank, 0) / found.length).toFixed(1) : '—';

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-pill"><strong>${dim}×${dim}</strong>grid points</div>
      <div class="stat-pill"><strong>${avgRank}</strong>avg rank</div>
      <div class="stat-pill"><strong style="color:#16a34a">${top3}</strong>top 3</div>
      <div class="stat-pill"><strong style="color:#c8f135">${top7}</strong>top 7</div>
      <div class="stat-pill"><strong style="color:#ff4d4d">${invisible}</strong>invisible</div>
    `;

    // Map
    if (map) { map.remove(); map = null; }
    map = L.map('map', { zoomControl: true, attributionControl: false })
           .setView([centerLat, centerLng], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, crossOrigin: true,
    }).addTo(map);

    // Fix tile loading artifact
    setTimeout(() => map.invalidateSize(), 300);

    // Center pin
    const pinIcon = L.divIcon({
      className: '',
      html: `<svg viewBox="0 0 30 42" width="30" height="42" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 15 27 15 27s15-16.5 15-27C30 6.7 23.3 0 15 0z" fill="#dc2626"/>
        <circle cx="15" cy="14" r="6" fill="#fff"/>
      </svg>`,
      iconSize: [30, 42],
      iconAnchor: [15, 42],
    });
    L.marker([centerLat, centerLng], { icon: pinIcon })
     .addTo(map)
     .bindPopup(`<div class="popup-title">${bizName}</div><div style="font-size:11px;color:#888">Business location</div>`);

    // Grid markers
    results.forEach(pt => {
      const r     = pt.rank;
      const color = rankColor(r);
      const label = !r || r > 20 ? '20+' : String(r);
      const size  = 38;
      const fs    = label.length > 2 ? 11 : label.length > 1 ? 14 : 16;

      const icon = L.divIcon({
        className: '',
        html: `<div style="
          background:${color};
          color:${rankTextColor(r)};
          border-radius:50%;
          width:${size}px;height:${size}px;
          display:flex;align-items:center;justify-content:center;
          font-weight:800;font-size:${fs}px;
          border:3px solid rgba(255,255,255,0.9);
          box-shadow:0 2px 8px rgba(0,0,0,0.4);
          font-family:'Syne',sans-serif;
          ${pt.isCenter ? 'box-shadow:0 0 0 3px #c8f135,0 2px 12px rgba(0,0,0,0.5);' : ''}
        ">${label}</div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });

      // Popup with top results
      const topPlaces = pt.places.slice(0, 10);
      const listItems = topPlaces.map(p => {
        const bg = rankColor(p.rank);
        return `<li>
          <div class="popup-num" style="background:${bg};color:${rankTextColor(p.rank)}">${p.rank}</div>
          <span class="${p.isUs ? 'popup-you' : ''}">${p.name.substring(0, 35)}${p.isUs ? ' ◀' : ''}</span>
        </li>`;
      }).join('');

      const popup = `
        <div class="popup-title">${r ? `#${r} for "${keyword}"` : `Invisible for "${keyword}"`}</div>
        <ul class="popup-list">${listItems}</ul>
      `;

      L.marker([pt.lat, pt.lng], { icon })
       .addTo(map)
       .bindPopup(popup, { maxWidth: 280 });
    });

    // Fit bounds
    const lats = results.map(r => r.lat).concat(centerLat);
    const lngs = results.map(r => r.lng).concat(centerLng);
    map.fitBounds([
      [Math.min(...lats) - 0.003, Math.min(...lngs) - 0.003],
      [Math.max(...lats) + 0.003, Math.max(...lngs) + 0.003],
    ]);

    // Grid table
    const cellSize = Math.min(60, Math.floor(860 / dim));
    const gridTable = document.getElementById('gridTable');
    gridTable.style.gridTemplateColumns = `repeat(${dim}, ${cellSize}px)`;
    gridTable.innerHTML = '';

    for (let row = 0; row < dim; row++) {
      for (let col = 0; col < dim; col++) {
        const pt    = results.find(r => r.row === row && r.col === col);
        const r     = pt?.rank;
        const color = rankColor(r);
        const label = !r || r > 20 ? '20+' : `#${r}`;
        const fs    = cellSize < 40 ? '9px' : cellSize < 50 ? '11px' : '13px';

        const cell = document.createElement('div');
        cell.className = 'grid-cell' + (pt?.isCenter ? ' center-pin' : '');
        cell.style.cssText = `background:${color};color:${rankTextColor(r)};width:${cellSize}px;height:${cellSize}px;font-size:${fs};`;
        cell.textContent = label;
        cell.title = pt?.places?.[0]?.name || '';
        gridTable.appendChild(cell);
      }
    }

    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
