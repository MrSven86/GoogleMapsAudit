<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Maps Rank Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #999;
    --rank-good: #c8f135;
    --rank-mid: #ffb347;
    --rank-bad: #ff4d4d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 40px;
  }

  .logo {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus { border-color: var(--accent); }
  input[type="password"] { letter-spacing: 0.1em; }
  textarea { resize: vertical; line-height: 1.6; }

  .hint {
    margin-top: 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .url-counter {
    margin-top: 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .url-counter span { color: var(--accent); }

  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  .keywords-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .keyword-tag {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 10px 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .keyword-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .keyword-tag button:hover { color: var(--accent2); }

  .keyword-input-row { display: flex; gap: 8px; }
  .keyword-input-row input { flex: 1; }

  .btn-add {
    background: var(--border);
    border: 1px solid #333;
    color: var(--text);
    border-radius: 3px;
    padding: 11px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #2a2a2a; }

  .btn-run {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-run:hover { opacity: 0.9; }
  .btn-run:active { transform: scale(0.99); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    align-items: center;
    gap: 10px;
    display: none;
  }
  .status-bar.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--rank-bad);
    margin-bottom: 16px;
    display: none;
  }
  .error-box.visible { display: block; }

  /* ── RESULTS ── */
  #results { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .results-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }

  .btn-pdf {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 3px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  .btn-pdf:hover { background: var(--accent); color: #0a0a0a; }

  /* Business block */
  .biz-block {
    margin-bottom: 48px;
    border-top: 1px solid var(--border);
    padding-top: 32px;
  }
  .biz-block:first-child { border-top: none; padding-top: 0; }

  .biz-pdf-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.15s, color 0.15s;
  }
  .biz-pdf-btn:hover { border-color: var(--accent); color: var(--accent); }

  .biz-header {
    margin-bottom: 20px;
  }

  .biz-index {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .biz-title {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .keyword-section { margin-bottom: 28px; }

  .keyword-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .rank-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .rank-number {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    min-width: 110px;
  }
  .rank-number.good { color: var(--rank-good); }
  .rank-number.mid  { color: var(--rank-mid); }
  .rank-number.bad  { color: var(--rank-bad); }

  .rank-meta { flex: 1; }
  .rank-meta .biz-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .rank-meta .rank-desc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .results-list {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.is-target {
    background: rgba(200,241,53,0.07);
    border-left: 3px solid var(--accent);
  }
  .result-row:hover:not(.is-target) { background: #111; }

  .result-pos {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 26px;
    flex-shrink: 0;
    text-align: right;
  }
  .result-row.is-target .result-pos { color: var(--accent); font-weight: 700; }

  .result-name { flex: 1; font-size: 13px; font-weight: 600; }
  .result-row.is-target .result-name { color: var(--accent); }

  .result-rating {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .invisible-row {
    padding: 12px 14px;
    background: rgba(255,77,77,0.05);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--rank-bad);
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(255,77,77,0.15);
  }

  .comparison-wrap { margin-top: 10px; }

  .comparison-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }

  .comparison-table thead tr { background: #1a1a1a; }

  .comparison-table th {
    padding: 9px 12px;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .comparison-table th:nth-child(2) { color: var(--accent); }

  .comparison-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .comparison-table tr:last-child td { border-bottom: none; }
  .comparison-table tr:hover td { background: #111; }
  .comparison-table td:first-child { color: var(--muted); font-size: 11px; }

  .cmp-you  { color: var(--text); font-weight: 500; }
  .cmp-num1 { color: #888; }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-good    { background: rgba(200,241,53,0.15); color: var(--accent); }
  .badge-bad     { background: rgba(255,77,77,0.12);  color: var(--rank-bad); }
  .badge-ok      { background: rgba(255,179,71,0.15); color: var(--rank-mid); }
  .badge-neutral { background: #1e1e1e; color: #888; }

  .coords-pill {
    display: none;
    margin-top: 6px;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }
  .coords-pill.visible { display: inline-flex; }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; color: #000; padding: 20px; }
    .card, .rank-hero, .results-list, .comparison-table { border-color: #ddd; background: #fff; }
    .btn-pdf, .btn-run, #inputSection { display: none !important; }
    #results { display: block !important; }
    .rank-number.good { color: #4a7c00; }
    .rank-number.mid  { color: #b36200; }
    .rank-number.bad  { color: #c00; }
    h1, .results-header h2, .rank-meta .biz-name, .result-name, .biz-title { color: #000; }
    .result-row.is-target { background: #f5ffe0; }
    .result-row.is-target .result-name,
    .result-row.is-target .result-pos { color: #4a7c00; }
    label, .hint, .logo, .subtitle, .keyword-label, .biz-index,
    .result-rating, .rank-meta .rank-desc, .result-pos, .comparison-title { color: #555; }
    .comparison-table thead tr { background: #f5f5f5; }
    .comparison-table th { color: #888; border-color: #ddd; }
    .comparison-table th:nth-child(2) { color: #4a7c00; }
    .comparison-table td { border-color: #eee; color: #000; }
    .badge-good { background: #f0ffe0; color: #4a7c00; }
    .badge-bad  { background: #fff0f0; color: #c00; }
    .badge-ok   { background: #fff8ec; color: #b36200; }
    .badge-neutral { background: #f5f5f5; color: #666; }
    .biz-block { border-top-color: #ddd; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Maps Rank Checker</div>
    <h1>Where do you<br>actually <span>rank?</span></h1>
    <p class="subtitle">// paste up to 30 Google Maps URLs — rank check all of them at once</p>
  </header>

  <div id="inputSection">

    <div class="card">
      <div class="field">
        <label>Google Maps URLs — one per line (max 30)</label>
        <textarea id="mapsUrls" rows="6" placeholder="https://www.google.com/maps/place/Plomero+Garcia/@-33.123,-70.456,15z/…
https://www.google.com/maps/place/Dr+Cifuentes/@-33.456,-70.789,15z/…
https://www.google.com/maps/place/Peluqueria+Ana/@-34.567,-70.123,15z/…"></textarea>
        <div class="url-counter" id="urlCounter">0 / 30 URLs</div>
        <div class="hint">// coordinates are extracted automatically from each URL</div>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label>Keywords</label>
        <div class="keyword-input-row">
          <input type="text" id="keywordInput" placeholder="e.g. plumber, gas fitter…">
          <button class="btn-add" onclick="addKeyword()">+ Add</button>
        </div>
        <div class="hint">// all keywords run in one batch — much faster</div>
        <div class="keywords-grid" id="keywordTags"></div>
      </div>
      <div class="field" style="margin-top:20px;">
        <label>Search Area</label>
        <select id="searchArea" style="background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none;">
          <option value="15">🏙 Big City — Buenos Aires, Madrid, Stockholm…</option>
          <option value="12">🏘 Small Town — Spokane, Hermiston, local area…</option>
        </select>
      </div>
      <div class="field" style="margin-top:20px;">
        <label>Report Language</label>
        <select id="reportLang" style="background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:11px 14px;width:100%;outline:none;">
          <option value="en">🇬🇧 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="sv">🇸🇪 Svenska</option>
        </select>
      </div>
    </div>

    <button class="btn-run" id="runBtn" onclick="runCheck()">▶ Run Rank Check</button>

  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Initialising…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <div class="results-header">
      <h2>Audit Results</h2>
      <button class="btn-pdf" onclick="window.print()">⬇ Save as PDF</button>
    </div>
    <div id="resultsBody"></div>
  </div>

</div>

<script>
  const BASE = 'https://api.apify.com/v2';
  const ACTOR = 'compass~crawler-google-places';

  let keywords = [];

  // ── Translations ──
  const T = {
    en: {
      keyword:       kw => `// keyword: "${kw}"`,
      ranked:        (pos, total, kw) => `Ranked ${pos} out of ${total} results for "${kw}"`,
      invisible:     (total, kw) => `Not visible in the top ${total} results for "${kw}"`,
      notFound:      name => `${name} — not found in top results`,
      you:           '◀ YOU',
      vsTitle:       'Your profile vs #1',
      vsSub:         (you, num1) => `// ${you} vs ${num1}`,
      metric:        'Metric',

      checklistStep: 'Step', checklistItem: 'Item', checklistStatus: 'Status', checklistAction: 'Action required',
      cl: { phone: 'Phone', hours: 'Opening hours', categories: 'Categories', rating: 'Rating', reviews: 'Reviews',
            configured: 'Configured', missing: 'MISSING', none: 'NONE', noRating: 'No rating',
            addPhone: 'Add phone number to profile', addHours: 'Set up opening hours',
            addCats: 'Add 3-5 relevant categories', getReviews: 'Get first reviews',
            moreReviews: 'Need 10+ reviews — set up review request system (4-5★ only)', reviewsLow: '(low)' },
    },
    es: {
      keyword:       kw => `// palabra clave: "${kw}"`,
      ranked:        (pos, total, kw) => `Posición ${pos} de ${total} resultados para "${kw}"`,
      invisible:     (total, kw) => `No visible en el top ${total} para "${kw}"`,
      notFound:      name => `${name} — no encontrado en los resultados`,
      you:           '◀ USTED',
      vsTitle:       'Tu perfil vs #1',
      vsSub:         (you, num1) => `// ${you} vs ${num1}`,

      youCol:        name => `Usted — ${name}`,
      num1Col:       name => `#1 — ${name}`,
      rating:        'Calificación',

      bizOf:         (i, total) => `// negocio ${i} de ${total}`,
      summary:       (n, k, ts) => `// ${n} negocios · ${k} palabras clave · ${ts}`,
      openPdf:       '⬇ Abrir como PDF',
      printHint:     'Presiona <strong>Ctrl+P</strong> (o Cmd+P en Mac) → Guardar como PDF',
      checklistTitle: 'Checklist de optimización del perfil',
      checklistStep: 'Paso', checklistItem: 'Ítem', checklistStatus: 'Estado', checklistAction: 'Acción requerida',
      cl: { phone: 'Teléfono', hours: 'Horarios de atención', categories: 'Categorías', rating: 'Calificación', reviews: 'Reseñas',
            configured: 'Configurado', missing: 'VACÍO', none: 'NINGUNA', noRating: 'Sin calificación',
            addPhone: 'Agregar teléfono al perfil', addHours: 'Configurar horarios de atención',
            addCats: 'Agregar 3-5 categorías relevantes', getReviews: 'Conseguir primeras reseñas',
            moreReviews: 'Necesita 10+ reseñas — configurar sistema de solicitud (solo 4-5★)', reviewsLow: '(pocas)' },
    },
    sv: {
      keyword:       kw => `// sökord: "${kw}"`,
      ranked:        (pos, total, kw) => `Placering ${pos} av ${total} resultat för "${kw}"`,
      invisible:     (total, kw) => `Inte synlig i topp ${total} för "${kw}"`,
      notFound:      name => `${name} — hittades inte i resultaten`,
      you:           '◀ DU',
      vsTitle:       'Din profil vs #1',
      vsSub:         (you, num1) => `// ${you} vs ${num1}`,
      metric:        'Mätvärde',
      youCol:        name => `Du — ${name}`,
      num1Col:       name => `#1 — ${name}`,
      rating:        'Betyg',
      reviews:       'Recensioner',
      website:       'Hemsida',
      phone:         'Telefon',
      hours:         'Öppettider',
      categories:    'Kategorier',
      yes:           'Ja',
      no:            'Nej',
      noRating:      'Inget betyg',
      bizOf:         (i, total) => `// företag ${i} av ${total}`,
      summary:       (n, k, ts) => `// ${n} företag · ${k} sökord · ${ts}`,
      openPdf:       '⬇ Öppna som PDF',
      printHint:     'Tryck <strong>Ctrl+P</strong> (eller Cmd+P på Mac) → Spara som PDF',
      checklistTitle: 'Checklista för profiloptimering',
      checklistStep: 'Steg', checklistItem: 'Punkt', checklistStatus: 'Status', checklistAction: 'Åtgärd krävs',
      cl: { phone: 'Telefon', hours: 'Öppettider', categories: 'Kategorier', rating: 'Betyg', reviews: 'Recensioner',
            configured: 'Konfigurerat', missing: 'SAKNAS', none: 'INGEN', noRating: 'Inget betyg',
            addPhone: 'Lägg till telefonnummer', addHours: 'Ange öppettider',
            addCats: 'Lägg till 3-5 relevanta kategorier', getReviews: 'Få första recensionerna',
            moreReviews: 'Behöver 10+ recensioner — sätt upp system (bara 4-5★)', reviewsLow: '(få)' },
    },
  };

  function getLang() {
    return T[document.getElementById('reportLang').value] || T.en;
  }

  function buildChecklist(you, t) {
    const ok  = (label) => `<span class="cl-ok">✓ ${label}</span>`;
    const bad = (label) => `<span class="cl-bad">✗ ${label}</span>`;
    const rows = [
      { step: 'A1', item: t.cl.phone,      status: you.phone      ? ok(t.cl.configured) : bad(t.cl.missing),   action: you.phone      ? '—' : t.cl.addPhone },
      { step: 'A2', item: t.cl.hours,      status: you.hours      ? ok(t.cl.configured) : bad(t.cl.missing),   action: you.hours      ? '—' : t.cl.addHours },
      { step: 'A3', item: t.cl.categories, status: you.categories?.length ? ok(you.categories.join(', ')) : bad(t.cl.none), action: you.categories?.length ? '—' : t.cl.addCats },
      { step: 'A4', item: t.cl.rating,     status: you.rating     ? ok('★ ' + Number(you.rating).toFixed(1)) : bad(t.cl.noRating), action: you.rating ? '—' : t.cl.getReviews },
      { step: 'A5', item: t.cl.reviews,    status: (you.reviews >= 10) ? ok(you.reviews) : bad((you.reviews || 0) + ' ' + t.cl.reviewsLow), action: (!you.reviews || you.reviews < 10) ? t.cl.moreReviews : '—' },
    ];
    return rows.map(r => `
      <tr>
        <td>${r.step}</td>
        <td>${r.item}</td>
        <td>${r.status}</td>
        <td class="cl-action">${r.action}</td>
      </tr>`).join('');
  }

  // ── URL counter ──
  document.getElementById('mapsUrls').addEventListener('input', function() {
    const urls = parseUrls(this.value);
    const counter = document.getElementById('urlCounter');
    counter.innerHTML = `<span>${urls.length}</span> / 30 URLs`;
    if (urls.length > 30) counter.style.color = 'var(--rank-bad)';
    else counter.style.color = 'var(--muted)';
  });

  function parseUrls(raw) {
    return raw.split('\n')
      .map(u => u.trim())
      .filter(u => u.includes('google.com/maps') || u.includes('goo.gl'));
  }

  // ── Coord extraction ──
  function extractCoords(url) {
    let m = url.match(/@(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    m = url.match(/!3d(-?\d{1,3}\.\d+).*?!4d(-?\d{1,3}\.\d+)/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    m = url.match(/[?&]ll=(-?\d{1,3}\.\d+),(-?\d{1,3}\.\d+)/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    return null;
  }

  function extractNameFromUrl(url) {
    const m = url.match(/maps\/place\/([^/@]+)/);
    if (!m) return null;
    return decodeURIComponent(m[1].replace(/\+/g, ' '));
  }

  // ── Keywords ──
  document.getElementById('keywordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addKeyword();
  });

  function addKeyword() {
    const input = document.getElementById('keywordInput');
    const val = input.value.trim();
    if (!val || keywords.includes(val)) { input.value = ''; return; }
    keywords.push(val);
    input.value = '';
    renderTags();
  }

  function removeKeyword(idx) {
    keywords.splice(idx, 1);
    renderTags();
  }

  function renderTags() {
    document.getElementById('keywordTags').innerHTML = keywords.map((kw, i) => `
      <div class="keyword-tag">
        ${esc(kw)}
        <button onclick="removeKeyword(${i})" title="Remove">×</button>
      </div>
    `).join('');
  }

  // ── Utils ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('statusBar').classList.add('visible');
    document.getElementById('statusText').textContent = msg;
  }

  function hideStatus() {
    document.getElementById('statusBar').classList.remove('visible');
  }

  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = '⚠ ' + msg;
    b.classList.add('visible');
  }

  function clearError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function normalize(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function isRealWebsite(url) {
    if (!url) return false;
    if (typeof url !== 'string') return false;
    if (url.trim() === '') return false;
    const social = ['facebook.com','fb.com','instagram.com','twitter.com',
                    'x.com','tiktok.com','youtube.com','linkedin.com',
                    'yelp.com','tripadvisor.com','google.com','goo.gl',
                    'maps.app','linktr.ee','wa.me','whatsapp.com'];
    try {
      const host = new URL(url).hostname.replace('www.', '');
      return !social.some(s => host.includes(s));
    } catch { return false; }
  }

  // ── Apify: start actor and poll ──
  async function startActor(token, input) {
    // Route through our proxy to avoid CORS
    const res = await fetch(`/api/proxy?url=${encodeURIComponent(
      `${BASE}/acts/${ACTOR}/runs?token=${token}`
    )}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(input),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Apify HTTP ${res.status}`);
    }

    const { data: run } = await res.json();
    return run;
  }

  async function pollUntilDone(token, runId, label) {
    for (let i = 0; i < 72; i++) {
      await sleep(5000);
      const res  = await fetch(`/api/proxy?url=${encodeURIComponent(`${BASE}/actor-runs/${runId}?token=${token}`)}`);
      const data = await res.json();
      const s    = data.data.status;
      setStatus(`${label} — ${s} (${(i+1)*5}s)…`);
      if (s === 'SUCCEEDED') break;
      if (['FAILED','ABORTED','TIMED-OUT'].includes(s)) throw new Error(`Apify run ${s}`);
    }
  }

  async function fetchDataset(token, datasetId, limit = 25) {
    const res   = await fetch(`/api/proxy?url=${encodeURIComponent(
      `${BASE}/datasets/${datasetId}/items?token=${token}&limit=${limit}`
    )}`);
    return res.json();
  }

  // ── Main ──
  async function runCheck() {
    clearError();
    document.getElementById('results').style.display = 'none';

    if (!keywords.length) return showError('Add at least one keyword.');

    const rawUrls = document.getElementById('mapsUrls').value;
    const urls = parseUrls(rawUrls).slice(0, 30);
    if (!urls.length) return showError('Paste at least one valid Google Maps URL.');

    // Parse all URLs
    const businesses = [];
    for (const url of urls) {
      const coords = extractCoords(url);
      if (!coords) {
        showError(`Could not read coordinates from: ${url.substring(0, 60)}… — make sure it's a full Google Maps URL, not a short link.`);
        return;
      }
      const name = extractNameFromUrl(url) || 'Business';
      businesses.push({ url, coords, name });
    }

    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    try {
      const allResults = [];

      for (let i = 0; i < businesses.length; i++) {
        const biz = businesses[i];
        const zoom    = parseInt(document.getElementById('searchArea').value);
        // Convert zoom to radius: zoom 15 ≈ 2500m, zoom 12 ≈ 20000m
        const radius  = zoom === 15 ? 2500 : zoom === 12 ? 20000 : 5000;

        setStatus(`Business ${i+1}/${businesses.length}: searching ${keywords.length} keywords…`);

        const byKeyword = {};
        for (const kw of keywords) byKeyword[kw] = [];

        for (const kw of keywords) {
          setStatus(`Business ${i+1}/${businesses.length}: "${kw}"…`);
          const res = await fetch('/api/places/nearby', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ keyword: kw, lat: biz.coords.lat, lng: biz.coords.lng, radius }),
          });
          const data = await res.json();
          if (data.places) {
            byKeyword[kw] = data.places.map((p, idx) => ({
              title:        p.displayName?.text || '',
              totalScore:   p.rating ?? null,
              reviewsCount: p.userRatingCount ?? null,
              website:      p.websiteUri ?? null,
              phone:        p.nationalPhoneNumber ?? null,
              openingHours: p.regularOpeningHours?.periods ?? [],
              categories:   p.types ?? [],
              placeId:      p.id ?? null,
              rank:         idx + 1,
              searchString: kw,
            }));
          }
        }

        allResults.push({ business: biz, byKeyword });
      }

      hideStatus();
      renderResults(allResults);

    } catch (err) {
      hideStatus();
      showError(err.message);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Render ──
  function renderResults(allResults) {
    const t   = getLang();
    const ts  = new Date().toLocaleString();
    let html  = `<p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:32px;">${t.summary(allResults.length, keywords.length, ts)}</p>`;

    for (let bi = 0; bi < allResults.length; bi++) {
      const { business, byKeyword } = allResults[bi];
      const normBiz = normalize(business.name);

      html += `<div class="biz-block" id="biz-block-${bi}" data-bizname="${esc(business.name)}">
        <div class="biz-header">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <div class="biz-index">${t.bizOf(bi + 1, allResults.length)}</div>
            <button class="biz-pdf-btn" onclick="openBizWindow(${bi})">${t.openPdf}</button>
          </div>
          <div class="biz-title">${esc(business.name)}</div>
        </div>`;

      for (const kw of keywords) {
        const items = byKeyword[kw] || [];

        const ranked = items.map((item, i) => {
          const name     = item.title || item.name || '(unknown)';
          const normName = normalize(name);
          const isTarget = normName.includes(normBiz) || normBiz.includes(normName);
          return {
            pos: i + 1, name,
            rating:     item.totalScore ?? item.rating ?? null,
            reviews:    item.reviewsCount ?? item.reviewCount ?? null,
            categories: item.categories ?? (item.categoryName ? [item.categoryName] : []),
            website:    isRealWebsite(item.website ?? null),
            phone:      !!(item.phone ?? item.phoneUnformatted ?? null),
            hours:      !!(item.openingHours?.length),
            isTarget,
          };
        });

        const target      = ranked.find(r => r.isTarget);
        const number1     = ranked[0];
        const pos         = target?.pos ?? null;
        const total       = ranked.length;
        const rankClass   = !pos ? 'bad' : pos <= 5 ? 'good' : pos <= 12 ? 'mid' : 'bad';
        const rankDisplay = pos ? `#${pos}` : '20+';
        const rankDesc    = pos
          ? t.ranked(pos, total, kw)
          : t.invisible(total, kw);

        // Comparison table
        let compHtml = '';
        if (target && number1 && target.pos !== 1) {
          const you  = target;
          const num1 = number1;

          const ratingBadge = (youVal, num1Val) => {
            if (youVal == null) return `<span class="badge badge-bad">${t.noRating}</span>`;
            const y = Number(youVal).toFixed(1);
            if (youVal >= num1Val)       return `<span class="badge badge-good">★ ${y}</span>`;
            if (youVal >= num1Val - 0.5) return `<span class="badge badge-ok">★ ${y}</span>`;
            return `<span class="badge badge-bad">★ ${y}</span>`;
          };

          const reviewBadge = (youVal, num1Val) => {
            if (!youVal) return `<span class="badge badge-bad">0</span>`;
            if (youVal >= num1Val)       return `<span class="badge badge-good">${youVal}</span>`;
            if (youVal >= num1Val * 0.5) return `<span class="badge badge-ok">${youVal}</span>`;
            return `<span class="badge badge-bad">${youVal}</span>`;
          };

          const yesNoBadge = (youVal, num1Val) => {
            const cls = youVal ? 'badge-good' : (num1Val ? 'badge-bad' : 'badge-neutral');
            return `<span class="badge ${cls}">${youVal ? t.yes : t.no}</span>`;
          };

          compHtml = `
            <div class="comparison-wrap">
              <div class="checklist-wrap">
                <div class="checklist-title">${t.checklistTitle}</div>
                <table class="checklist-table">
                  <thead><tr>
                    <th style="width:40px">${t.checklistStep}</th>
                    <th>${t.checklistItem}</th>
                    <th style="width:130px">${t.checklistStatus}</th>
                    <th>${t.checklistAction}</th>

                  <tbody>${buildChecklist(you, t)}</tbody>
                </table>
              </div>
              <div class="comparison-title" style="margin-top:24px">${t.vsTitle}</div>
              <div class="comparison-subtitle">${t.vsSub(esc(business.name), esc(num1.name))}</div>
              <table class="comparison-table">
                <thead><tr>
                  <th>${t.metric}</th>
                  <th>${t.youCol(esc(business.name))}</th>
                  <th>${t.num1Col(esc(num1.name))}</th>
                </tr></thead>
                <tbody>
                  <tr>
                    <td>${t.rating}</td>
                    <td class="cmp-you">${ratingBadge(you.rating, num1.rating)}</td>
                    <td class="cmp-num1">${num1.rating != null ? '★ ' + Number(num1.rating).toFixed(1) : '—'}</td>
                  </tr>
                  <tr>
                    <td>${t.reviews}</td>
                    <td class="cmp-you">${reviewBadge(you.reviews, num1.reviews)}</td>
                    <td class="cmp-num1">${num1.reviews ?? '—'}</td>
                  </tr>
                  <tr>
                    <td>${t.website}</td>
                    <td class="cmp-you">${yesNoBadge(you.website, num1.website)}</td>
                    <td class="cmp-num1">${num1.website ? t.yes : t.no}</td>
                  </tr>
                  <tr>
                    <td>${t.phone}</td>
                    <td class="cmp-you">${yesNoBadge(you.phone, num1.phone)}</td>
                    <td class="cmp-num1">${num1.phone ? t.yes : t.no}</td>
                  </tr>
                  <tr>
                    <td>${t.hours}</td>
                    <td class="cmp-you">${yesNoBadge(you.hours, num1.hours)}</td>
                    <td class="cmp-num1">${num1.hours ? t.yes : t.no}</td>
                  </tr>
                  <tr>
                    <td>${t.categories}</td>
                    <td class="cmp-you"><span class="badge badge-neutral">${esc(you.categories?.join(', ') || '—')}</span></td>
                    <td class="cmp-num1">${esc(num1.categories?.join(', ') || '—')}</td>
                  </tr>
                </tbody>
              </table>
            </div>`;
        }

        html += `
          <div class="keyword-section">
            <div class="keyword-label">${t.keyword(kw)}</div>
            <div class="rank-hero">
              <div class="rank-number ${rankClass}">${rankDisplay}</div>
              <div class="rank-meta">
                <div class="biz-name">${esc(business.name)}</div>
                <div class="rank-desc">${rankDesc}</div>
              </div>
            </div>
            <div class="results-list">
              ${ranked.map(r => `
                <div class="result-row${r.isTarget ? ' is-target' : ''}">
                  <span class="result-pos">${r.pos}</span>
                  <span class="result-name">${esc(r.name)}${r.isTarget ? ' ' + t.you : ''}</span>
                  <span class="result-rating">${r.rating != null ? '★ ' + Number(r.rating).toFixed(1) + (r.reviews ? ' (' + r.reviews + ')' : '') : ''}</span>
                </div>`).join('')}
              ${!target ? `<div class="invisible-row">✕ &nbsp;${esc(t.notFound(business.name))}</div>` : ''}
            </div>
            ${compHtml}
          </div>`;
      }

      html += `</div>`; // end biz-block
    }

    document.getElementById('resultsBody').innerHTML = html;
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
