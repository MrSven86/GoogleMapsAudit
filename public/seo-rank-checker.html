<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Rank Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #999;
    --rank-good: #c8f135;
    --rank-mid: #ffb347;
    --rank-bad: #ff4d4d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 820px; margin: 0 auto; }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
    margin-bottom: 40px;
  }

  .logo {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .logo a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .logo a:hover { color: var(--accent); }

  h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--accent); }
  input[type="password"] { letter-spacing: 0.1em; }

  .hint {
    margin-top: 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
  }

  .field { margin-bottom: 20px; }
  .field:last-child { margin-bottom: 0; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 560px) { .two-col { grid-template-columns: 1fr; } }

  .keywords-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .keyword-tag {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 10px 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .keyword-tag button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 15px;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .keyword-tag button:hover { color: var(--accent2); }

  .keyword-input-row { display: flex; gap: 8px; }
  .keyword-input-row input { flex: 1; }

  .btn-add {
    background: var(--border);
    border: 1px solid #333;
    color: var(--text);
    border-radius: 3px;
    padding: 11px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #2a2a2a; }

  .btn-run {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #0a0a0a;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-run:hover { opacity: 0.9; }
  .btn-run:active { transform: scale(0.99); }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    align-items: center;
    gap: 10px;
    display: none;
  }
  .status-bar.visible { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(255,77,77,0.08);
    border: 1px solid rgba(255,77,77,0.3);
    border-radius: 4px;
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--rank-bad);
    margin-bottom: 16px;
    display: none;
  }
  .error-box.visible { display: block; }

  #results { display: none; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .results-header h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }

  .btn-pdf {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 3px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  .btn-pdf:hover { background: var(--accent); color: #0a0a0a; }

  .keyword-section { margin-bottom: 32px; }

  .keyword-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .rank-hero {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 24px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .rank-number {
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    min-width: 110px;
  }
  .rank-number.good { color: var(--rank-good); }
  .rank-number.mid  { color: var(--rank-mid); }
  .rank-number.bad  { color: var(--rank-bad); }

  .rank-meta { flex: 1; }
  .rank-meta .site-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .rank-meta .rank-desc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .results-list {
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .result-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.is-target {
    background: rgba(200,241,53,0.07);
    border-left: 3px solid var(--accent);
  }
  .result-row:hover:not(.is-target) { background: #111; }

  .result-pos {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 26px;
    flex-shrink: 0;
    text-align: right;
    padding-top: 2px;
  }
  .result-row.is-target .result-pos { color: var(--accent); font-weight: 700; }

  .result-info { flex: 1; min-width: 0; }
  .result-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-row.is-target .result-title { color: var(--accent); }

  .result-url {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-you {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    flex-shrink: 0;
    padding-top: 2px;
  }

  .invisible-row {
    padding: 12px 14px;
    background: rgba(255,77,77,0.05);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--rank-bad);
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid rgba(255,77,77,0.15);
  }

  @media print {
    body { background: #fff; color: #000; padding: 20px; }
    .card, .rank-hero, .results-list { border-color: #ddd; background: #fff; }
    .btn-pdf, .btn-run, #inputSection { display: none !important; }
    #results { display: block !important; }
    .rank-number.good { color: #4a7c00; }
    .rank-number.mid  { color: #b36200; }
    .rank-number.bad  { color: #c00; }
    .rank-meta .site-name, .result-title { color: #000; }
    .result-row.is-target { background: #f5ffe0; }
    .result-row.is-target .result-title,
    .result-row.is-target .result-pos { color: #4a7c00; }
    .result-url, .rank-meta .rank-desc, .result-pos, .keyword-label { color: #555; }
    .invisible-row { background: #fff0f0; color: #c00; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">
      <a href="/index.html">← Maps Rank Checker</a>
      &nbsp;/&nbsp; SEO Rank Checker
    </div>
    <h1>Where do you rank<br>on <span>Google?</span></h1>
    <p class="subtitle">// check organic search position for any website</p>
  </header>

  <div id="inputSection">

    <div class="card">
      <div class="field">
        <label>Apify API Token</label>
        <input type="password" id="apifyToken" placeholder="apify_api_xxxx…" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <div class="two-col">
        <div class="field">
          <label>Website URL</label>
          <input type="text" id="websiteUrl" placeholder="e.g. raelectricista.com">
          <div class="hint">// domain only, no https://</div>
        </div>
        <div class="field">
          <label>Country</label>
          <select id="countryCode">
            <option value="ar">🇦🇷 Argentina</option>
            <option value="es">🇪🇸 Spain</option>
            <option value="mx">🇲🇽 Mexico</option>
            <option value="us">🇺🇸 United States</option>
            <option value="se">🇸🇪 Sweden</option>
            <option value="gb">🇬🇧 United Kingdom</option>
            <option value="cl">🇨🇱 Chile</option>
            <option value="co">🇨🇴 Colombia</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>City</label>
        <input type="text" id="cityName" placeholder="e.g. Buenos Aires, Stockholm, Madrid">
        <div class="hint">// geographic restriction for search results</div>
      </div>
      <div class="field">
        <label>Search Engine</label>
        <select id="searchEngine">
          <option value="google.com">google.com</option>
          <option value="google.com.ar">google.com.ar 🇦🇷</option>
          <option value="google.se">google.se 🇸🇪</option>
          <option value="google.es">google.es 🇪🇸</option>
          <option value="google.com.mx">google.com.mx 🇲🇽</option>
          <option value="google.co.uk">google.co.uk 🇬🇧</option>
          <option value="google.cl">google.cl 🇨🇱</option>
          <option value="google.com.co">google.com.co 🇨🇴</option>
          <option value="google.com.br">google.com.br 🇧🇷</option>
          <option value="google.de">google.de 🇩🇪</option>
          <option value="google.fr">google.fr 🇫🇷</option>
          <option value="google.it">google.it 🇮🇹</option>
          <option value="google.com.au">google.com.au 🇦🇺</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="field">
        <label>Keywords</label>
        <div class="keyword-input-row">
          <input type="text" id="keywordInput" placeholder="e.g. electricista palermo, electricista buenos aires…">
          <button class="btn-add" onclick="addKeyword()">+ Add</button>
        </div>
        <div class="hint">// press Enter or click Add</div>
        <div class="keywords-grid" id="keywordTags"></div>
      </div>
    </div>

    <button class="btn-run" id="runBtn" onclick="runCheck()">▶ Run SEO Check</button>

  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Starting…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <div class="results-header">
      <h2>SEO Results</h2>
      <button class="btn-pdf" onclick="window.print()">⬇ Save as PDF</button>
    </div>
    <div id="resultsBody"></div>
  </div>

</div>

<script>
  const BASE  = 'https://api.apify.com/v2';
  const ACTOR = 'apify~google-search-scraper';

  let keywords = [];

  document.getElementById('keywordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addKeyword();
  });

  function addKeyword() {
    const input = document.getElementById('keywordInput');
    const val = input.value.trim();
    if (!val || keywords.includes(val)) { input.value = ''; return; }
    keywords.push(val);
    input.value = '';
    renderTags();
  }

  function removeKeyword(idx) { keywords.splice(idx, 1); renderTags(); }

  function renderTags() {
    document.getElementById('keywordTags').innerHTML = keywords.map((kw, i) => `
      <div class="keyword-tag">${esc(kw)}<button onclick="removeKeyword(${i})">×</button></div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg) {
    document.getElementById('statusBar').classList.add('visible');
    document.getElementById('statusText').textContent = msg;
  }
  function hideStatus() { document.getElementById('statusBar').classList.remove('visible'); }
  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = '⚠ ' + msg;
    b.classList.add('visible');
  }
  function clearError() { document.getElementById('errorBox').classList.remove('visible'); }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function cleanDomain(url) {
    return url.replace(/^https?:\/\//i, '').replace(/^www\./i, '').split('/')[0].toLowerCase().trim();
  }

  async function startActor(token, input) {
    const res = await fetch(`/api/proxy?url=${encodeURIComponent(`${BASE}/acts/${ACTOR}/runs?token=${token}`)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(input),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Apify HTTP ${res.status}`);
    }
    const { data: run } = await res.json();
    return run;
  }

  async function pollUntilDone(token, runId, label) {
    for (let i = 0; i < 72; i++) {
      await sleep(5000);
      const res  = await fetch(`/api/proxy?url=${encodeURIComponent(`${BASE}/actor-runs/${runId}?token=${token}`)}`);
      const data = await res.json();
      const s    = data.data.status;
      setStatus(`${label} — ${s} (${(i+1)*5}s)…`);
      if (s === 'SUCCEEDED') break;
      if (['FAILED','ABORTED','TIMED-OUT'].includes(s)) throw new Error(`Apify run ${s}`);
    }
  }

  async function fetchDataset(token, datasetId) {
    const res = await fetch(`/api/proxy?url=${encodeURIComponent(`${BASE}/datasets/${datasetId}/items?token=${token}&limit=100`)}`);
    return res.json();
  }

  // Generate Google UULE location code from city name
  function generateUule(location) {
    const secret = 'AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY';
    const str = 'role::1\nproducer::12\nprovenance::6\ntimestamp::' + 
      (Date.now() * 1000) + '\nlatlng{\nlatitude_e7::0\nlongitude_e7::0\n}\nradius::-1\nfulladdress::' + location + '\n';
    // Simple base64 UULE
    return 'w+CAIQICIa' + btoa(location);
  }

  async function runCheck() {
    clearError();
    document.getElementById('results').style.display = 'none';

    const token   = document.getElementById('apifyToken').value.trim();
    const website = document.getElementById('websiteUrl').value.trim();
    const country = document.getElementById('countryCode').value;
    const city    = document.getElementById('cityName').value.trim();
    const engine  = document.getElementById('searchEngine').value;

    if (!token)           return showError('Apify token is required.');
    if (!website)         return showError('Website URL is required.');
    if (!keywords.length) return showError('Add at least one keyword.');

    const domain = cleanDomain(website);
    const btn = document.getElementById('runBtn');
    btn.disabled = true;

    try {
      const allResults = {};

      for (let i = 0; i < keywords.length; i++) {
        const kw = keywords[i];
        setStatus(`Searching "${kw}" in ${city || country} (${i+1}/${keywords.length})…`);

        const langCode = country === 'se' ? 'sv' : country === 'us' || country === 'gb' ? 'en' : 'es';
        const query = city ? `${kw} ${city}` : kw;

        const run = await startActor(token, {
          queries: query,
          maxPagesPerQuery: 3,
          countryCode: country,
          languageCode: langCode,
          mobileResults: false,
        });

        await pollUntilDone(token, run.id, `"${kw}"`);
        const items = await fetchDataset(token, run.defaultDatasetId);
        allResults[kw] = items;
      }

      hideStatus();
      renderResults(allResults, domain);

    } catch (err) {
      hideStatus();
      showError(err.message);
    } finally {
      btn.disabled = false;
    }
  }

  function renderResults(allResults, domain) {
    const ts  = new Date().toLocaleString();
    let html  = `<p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:32px;">// ${esc(domain)} · ${ts}</p>`;

    for (const [kw, pages] of Object.entries(allResults)) {
      // Flatten all organic results
      const organic = [];
      for (const page of pages) {
        if (page.organicResults) {
          for (const r of page.organicResults) {
            organic.push({
              pos:   r.position ?? (organic.length + 1),
              title: r.title || '',
              url:   r.url || '',
              desc:  r.description || '',
            });
          }
        }
      }

      // Find our domain
      const target = organic.find(r => {
        const rDomain = cleanDomain(r.url);
        return rDomain === domain || rDomain.endsWith('.' + domain);
      });

      const pos         = target?.pos ?? null;
      const total       = organic.length;
      const rankClass   = !pos ? 'bad' : pos <= 3 ? 'good' : pos <= 10 ? 'mid' : 'bad';
      const rankDisplay = pos ? `#${pos}` : '100+';
      const rankDesc    = pos
        ? `Position ${pos} out of ${total} results for "${kw}"`
        : `Not found in top ${total} results for "${kw}"`;

      html += `
        <div class="keyword-section">
          <div class="keyword-label">// keyword: "${esc(kw)}"</div>
          <div class="rank-hero">
            <div class="rank-number ${rankClass}">${rankDisplay}</div>
            <div class="rank-meta">
              <div class="site-name">${esc(domain)}</div>
              <div class="rank-desc">${rankDesc}</div>
            </div>
          </div>
          <div class="results-list">
            ${organic.slice(0, 20).map(r => {
              const isTarget = cleanDomain(r.url) === domain || cleanDomain(r.url).endsWith('.' + domain);
              return `
                <div class="result-row${isTarget ? ' is-target' : ''}">
                  <span class="result-pos">${r.pos}</span>
                  <div class="result-info">
                    <div class="result-title">${esc(r.title)}</div>
                    <div class="result-url">${esc(cleanDomain(r.url))}</div>
                  </div>
                  ${isTarget ? `<span class="result-you">◀ YOU</span>` : ''}
                </div>`;
            }).join('')}
            ${!target ? `<div class="invisible-row">✕ &nbsp;${esc(domain)} — not found in top ${total} results</div>` : ''}
          </div>
        </div>`;
    }

    document.getElementById('resultsBody').innerHTML = html;
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
</script>
</body>
</html>
